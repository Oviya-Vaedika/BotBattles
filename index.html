<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PentaPlay Arcade</title>
    <!-- Tailwind CSS for sleek dark mode layouts -->
    <script src="https://jsdelivr.net"></script>
    <style>
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .grid-4x4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-8x8 { display: grid; grid-template-columns: repeat(8, 1fr); }
        .grid-9x9 { display: grid; grid-template-columns: repeat(9, 1fr); gap: 2px; background-color: #4b5563; padding: 2px; }
        .sudoku-cell { width: 100%; aspect-ratio: 1; text-align: center; background-color: #1f2937; color: white; border: 1px solid #374151; font-weight: bold; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #9ca3af; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-block-row { border-bottom: 2px solid #9ca3af; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col items-center justify-start p-4">

    <!-- HEADER NAVIGATION -->
    <header class="w-full max-w-md flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
        <button id="backBtn" class="hidden bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded text-sm font-semibold flex items-center gap-1 transition" onclick="showScreen('main-menu')">
            ← Home
        </button>
        <h1 id="appTitle" class="text-2xl font-bold tracking-wider mx-auto text-indigo-400">PENTAPLAY</h1>
    </header>

    <main class="w-full max-w-md flex-1 flex flex-col justify-start">
        <!-- MAIN MENU SCREEN -->
        <section id="main-menu" class="screen space-y-6">
            <div class="text-center">
                <h2 class="text-xl font-semibold text-gray-300">Pick a game and play</h2>
                <p class="text-sm text-gray-500 mt-1">Five classic games, all in one place.</p>
            </div>
            
            <div class="grid grid-cols-1 gap-4">
                <!-- Chess -->
                <button onclick="showScreen('chess-screen')" class="flex items-center justify-between p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:border-indigo-500 transition text-left group">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-widest text-indigo-400 block mb-1">Strategy</span>
                        <h3 class="text-lg font-bold group-hover:text-indigo-300 transition">Chess Board</h3>
                        <p class="text-xs text-gray-400 mt-1">Interactive layout with active coordinate mapping.</p>
                    </div>
                    <span class="text-indigo-400 group-hover:translate-x-1 transition-transform">→</span>
                </button>
                
                <!-- Memory Match -->
                <button onclick="showScreen('memory-screen'); initMemory();" class="flex items-center justify-between p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:border-emerald-500 transition text-left group">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-widest text-emerald-400 block mb-1">Puzzle</span>
                        <h3 class="text-lg font-bold group-hover:text-emerald-300 transition">Drum Card</h3>
                        <p class="text-xs text-gray-400 mt-1">Flip and match pairs across a 4x4 card grid.</p>
                    </div>
                    <span class="text-emerald-400 group-hover:translate-x-1 transition-transform">→</span>
                </button>

                <!-- Hangman -->
                <button onclick="showScreen('hangman-screen'); initHangman();" class="flex items-center justify-between p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:border-amber-500 transition text-left group">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-widest text-amber-400 block mb-1">Word</span>
                        <h3 class="text-lg font-bold group-hover:text-amber-300 transition">Hangman</h3>
                        <p class="text-xs text-gray-400 mt-1">Guess the hidden mystery word letter by letter.</p>
                    </div>
                    <span class="text-amber-400 group-hover:translate-x-1 transition-transform">→</span>
                </button>

                <!-- Tic-Tac-Toe -->
                <button onclick="showScreen('ttt-screen'); initTTT();" class="flex items-center justify-between p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:border-rose-500 transition text-left group">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-widest text-rose-400 block mb-1">Classic</span>
                        <h3 class="text-lg font-bold group-hover:text-rose-300 transition">Tic-Tac-Toe</h3>
                        <p class="text-xs text-gray-400 mt-1">Classic 3x3 battle. Get three rows to win.</p>
                    </div>
                    <span class="text-rose-400 group-hover:translate-x-1 transition-transform">→</span>
                </button>

                <!-- Sudoku -->
                <button onclick="showScreen('sudoku-screen'); initSudoku();" class="flex items-center justify-between p-4 bg-gray-800/60 border border-gray-700/50 rounded-xl hover:border-cyan-500 transition text-left group">
                    <div>
                        <span class="text-xs font-bold uppercase tracking-widest text-cyan-400 block mb-1">Logic</span>
                        <h3 class="text-lg font-bold group-hover:text-cyan-300 transition">Sudoku Board</h3>
                        <p class="text-xs text-gray-400 mt-1">Fill rows, columns, and boxes with 1-9 without repeats.</p>
                    </div>
                    <span class="text-cyan-400 group-hover:translate-x-1 transition-transform">→</span>
                </button>
            </div>
        </section>
        <!-- GAME 1: CHESS SCREEN -->
        <section id="chess-screen" class="screen hidden space-y-4">
            <div class="text-center">
                <span class="bg-indigo-900 text-indigo-300 text-xs px-2.5 py-1 rounded-full font-bold uppercase">Chess Sandbox</span>
                <p id="chess-feedback" class="text-sm text-gray-400 mt-2">Tap a cell to map coordinates</p>
            </div>
            <div class="bg-gray-950 p-2 rounded-xl border border-gray-800 shadow-xl max-w-sm mx-auto">
                <div id="chess-board" class="grid-8x8 border-2 border-amber-900"></div>
            </div>
        </section>

        <!-- GAME 2: MEMORY MATCH (DRUM CARD) -->
        <section id="memory-screen" class="screen hidden space-y-4">
            <div class="flex justify-between items-center">
                <span class="bg-emerald-900 text-emerald-300 text-xs px-2.5 py-1 rounded-full font-bold uppercase">Drum Card</span>
                <button onclick="initMemory()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded border border-gray-700 text-emerald-400">Reset</button>
            </div>
            <div id="memory-board" class="grid-4x4 max-w-sm mx-auto bg-gray-950 p-3 rounded-xl border border-gray-800 shadow-xl"></div>
        </section>

        <!-- GAME 3: HANGMAN -->
        <section id="hangman-screen" class="screen hidden space-y-6">
            <div class="flex justify-between items-center">
                <span class="bg-amber-900 text-amber-300 text-xs px-2.5 py-1 rounded-full font-bold uppercase">Word Finder</span>
                <button onclick="initHangman()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded border border-gray-700 text-amber-400">Next Word</button>
            </div>
            <div class="text-center py-6 bg-gray-950 rounded-xl border border-gray-800">
                <div id="hangman-word" class="text-3xl font-mono tracking-widest font-bold text-amber-400 mb-2">_ _ _ _</div>
                <p id="hangman-status" class="text-xs text-gray-500 font-medium">Incorrect guesses left: <span id="hangman-lives" class="text-amber-500 font-bold">6</span></p>
            </div>
            <div class="space-y-2">
                <p class="text-xs text-gray-400 font-semibold uppercase tracking-wider text-center">Type your letter guess below:</p>
                <div class="flex gap-2 max-w-xs mx-auto">
                    <input type="text" id="hangman-input" maxlength="1" class="w-full bg-gray-800 border border-gray-700 rounded-lg text-center font-bold text-xl uppercase focus:border-amber-500 focus:outline-none py-2 text-white">
                    <button onclick="guessLetter()" class="bg-amber-600 hover:bg-amber-500 text-gray-950 font-bold px-6 rounded-lg transition text-sm">Submit</button>
                </div>
            </div>
        </section>

        <!-- GAME 4: TIC-TAC-TOE -->
        <section id="ttt-screen" class="screen hidden space-y-4">
            <div class="flex justify-between items-center">
                <span class="bg-rose-900 text-rose-300 text-xs px-2.5 py-1 rounded-full font-bold uppercase">3-in-a-row</span>
                <button onclick="initTTT()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded border border-gray-700 text-rose-400">Clear Board</button>
            </div>
            <div class="text-center">
                <p id="ttt-status" class="text-sm font-semibold text-gray-300">Player X's turn</p>
            </div>
            <div id="ttt-board" class="grid-3x3 max-w-xs mx-auto bg-gray-950 p-3 rounded-xl border border-gray-800 shadow-xl"></div>
        </section>

        <!-- GAME 5: SUDOKU -->
        <section id="sudoku-screen" class="screen hidden space-y-4">
            <div class="flex justify-between items-center">
                <span class="bg-cyan-900 text-cyan-300 text-xs px-2.5 py-1 rounded-full font-bold uppercase">Sudoku 9x9</span>
                <div class="flex gap-2">
                    <button onclick="checkSudoku()" class="text-xs bg-cyan-600 hover:bg-cyan-500 font-bold px-3 py-1 rounded text-gray-950">Validate</button>
                    <button onclick="initSudoku()" class="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded border border-gray-700 text-cyan-400">Reset</button>
                </div>
            </div>
            <div class="bg-gray-950 p-2 rounded-xl border border-gray-800 shadow-xl max-w-sm mx-auto">
                <div id="sudoku-board" class="grid-9x9"></div>
            </div>
            <p id="sudoku-feedback" class="text-center text-sm font-semibold text-gray-400"></p>
        </section>
    </main>
    <script>
        // NAVIGATION HANDLER
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            const backBtn = document.getElementById('backBtn');
            const appTitle = document.getElementById('appTitle');
            if(screenId === 'main-menu') {
                backBtn.classList.add('hidden');
                appTitle.classList.remove('hidden');
            } else {
                backBtn.classList.remove('hidden');
                appTitle.classList.add('hidden');
            }
        }

        // 1. CHESS ENGINE SANDBOX
        const initialChessBoard = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],['♟','♟','♟','♟','♟','♟','♟','♟'],
            ['','','','','','','',''],['','','','','','','',''],
            ['','','','','','','',''],['','','','','','','',''],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],['♖','♘','♗','♕','♔','♗','♘','♖']
        ];
        function initChess() {
            const board = document.getElementById('chess-board');
            board.innerHTML = '';
            const columns = ['A','B','C','D','E','F','G','H'];
            for(let r=0; r<8; r++) {
                for(let c=0; c<8; c++) {
                    const cell = document.createElement('button');
                    const isDark = (r + c) % 2 === 1;
                    cell.className = `aspect-square text-2xl flex items-center justify-center font-bold transition focus:outline-none ${isDark ? 'bg-amber-800 text-amber-100' : 'bg-amber-200 text-amber-900'}`;
                    cell.innerText = initialChessBoard[r][c];
                    const coord = `${columns[c]}${8 - r}`;
                    cell.onclick = () => {
                        document.getElementById('chess-feedback').innerText = `Selected Cell: ${coord} ${cell.innerText ? '(' + cell.innerText + ')' : '(Empty)'}`;
                    };
                    board.appendChild(cell);
                }
            }
        }
        initChess();

        // 2. DRUM CARD (MEMORY MATCH) CODE
        let memoryItems = ['🥁', '🎸', '🎺', '🎹', '🎵', '🎨', '🎮', '🧩', '🥁', '🎸', '🎺', '🎹', '🎵', '🎨', '🎮', '🧩'];
        let choiceStack = [];
        let lockBoard = false;
        function initMemory() {
            const board = document.getElementById('memory-board');
            board.innerHTML = '';
            choiceStack = [];
            lockBoard = false;
            memoryItems.sort(() => 0.5 - Math.random());
            memoryItems.forEach((item, index) => {
                const card = document.createElement('button');
                card.className = "aspect-square bg-gray-800 rounded-lg text-2xl flex items-center justify-center border border-gray-700 transition hover:bg-gray-700 font-bold";
                card.dataset.value = item;
                card.dataset.id = index;
                card.innerText = '❓';
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }
        function flipCard(card) {
            if (lockBoard || choiceStack.includes(card) || card.innerText !== '❓') return;
            card.innerText = card.dataset.value;
            card.className = "aspect-square bg-emerald-900/40 border border-emerald-500 rounded-lg text-2xl flex items-center justify-center font-bold scale-95 transition duration-100";
            choiceStack.push(card);
            if (choiceStack.length === 2) {
                lockBoard = true;
                const [card1, card2] = choiceStack;
                if (card1.dataset.value === card2.dataset.value) {
                    card1.disabled = true; card2.disabled = true;
                    choiceStack = []; lockBoard = false;
                } else {
                    setTimeout(() => {
                        card1.innerText = '❓'; card1.className = "aspect-square bg-gray-800 rounded-lg text-2xl flex items-center justify-center border border-gray-700 transition font-bold";
                        card2.innerText = '❓'; card2.className = "aspect-square bg-gray-800 rounded-lg text-2xl flex items-center justify-center border border-gray-700 transition font-bold";
                        choiceStack = []; lockBoard = false;
                    }, 1000);
                }
            }
        }
        // 3. HANGMAN LOGIC
        const wordPool = ['FLUTTER', 'GLIDE', 'GITHUB', 'ARCADE', 'MOBILE', 'CODING'];
        let selectedWord = '';
        let correctGuesses = [];
        let remLives = 6;
        function initHangman() {
            selectedWord = wordPool[Math.floor(Math.random() * wordPool.length)];
            correctGuesses = []; remLives = 6;
            document.getElementById('hangman-lives').innerText = remLives;
            document.getElementById('hangman-input').value = '';
            document.getElementById('hangman-status').className = "text-xs text-gray-500 font-medium";
            document.getElementById('hangman-status').innerHTML = `Incorrect guesses left: <span id="hangman-lives" class="text-amber-500 font-bold">${remLives}</span>`;
            updateWordDisplay();
        }
        function updateWordDisplay() {
            let display = '';
            for(let char of selectedWord) {
                if(correctGuesses.includes(char)) { display += char + ' '; } 
                else { display += '_ '; }
            }
            document.getElementById('hangman-word').innerText = display.trim();
            if(!display.includes('_')) {
                document.getElementById('hangman-status').innerText = '🎉 You Discovered the Word!';
                document.getElementById('hangman-status').className = "text-sm text-emerald-400 font-bold";
            }
        }
        function guessLetter() {
            const input = document.getElementById('hangman-input');
            const letter = input.value.toUpperCase().trim();
            input.value = '';
            if(!letter || remLives <= 0 || !/^[A-Z]$/.test(letter)) return;
            if(selectedWord.includes(letter)) {
                if(!correctGuesses.includes(letter)) correctGuesses.push(letter);
            } else {
                remLives--;
                document.getElementById('hangman-lives').innerText = remLives;
                if(remLives <= 0) {
                    document.getElementById('hangman-status').innerText = `💥 Game Over! Word was: ${selectedWord}`;
                    document.getElementById('hangman-status').className = "text-sm text-rose-500 font-bold";
                }
            }
            updateWordDisplay();
        }

        // 4. TIC-TAC-TOE LOGIC
        let tttState = ['','','','','','','','',''];
        let activeTurn = 'X';
        let isGameLive = true;
        function initTTT() {
            const board = document.getElementById('ttt-board');
            board.innerHTML = '';
            tttState = ['','','','','','','','',''];
            activeTurn = 'X'; isGameLive = true;
            document.getElementById('ttt-status').innerText = "Player X's turn";
            document.getElementById('ttt-status').className = "text-sm font-semibold text-gray-300";
            for(let i=0; i<9; i++) {
                const square = document.createElement('button');
                square.className = "aspect-square bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl text-3xl font-black flex items-center justify-center transition focus:outline-none h-20 text-white";
                square.onclick = () => handleTTTClick(square, i);
                board.appendChild(square);
            }
        }
        function handleTTTClick(square, idx) {
            if(tttState[idx] !== '' || !isGameLive) return;
            tttState[idx] = activeTurn;
            square.innerText = activeTurn;
            square.className = `aspect-square border border-gray-700 rounded-xl text-3xl font-black flex items-center justify-center h-20 transition scale-95 ${activeTurn === 'X' ? 'bg-rose-950/40 text-rose-400' : 'bg-indigo-950/40 text-indigo-400'}`;
            if(checkTTTWin()) {
                document.getElementById('ttt-status').innerText = `🏆 Player ${activeTurn} Wins!`;
                document.getElementById('ttt-status').className = "text-md font-bold text-emerald-400";
                isGameLive = false; return;
            }
            if(!tttState.includes('')) {
                document.getElementById('ttt-status').innerText = "🤝 Match Ended in Draw!";
                document.getElementById('ttt-status').className = "text-md font-bold text-amber-400";
                isGameLive = false; return;
            }
            activeTurn = activeTurn === 'X' ? 'O' : 'X';
            document.getElementById('ttt-status').innerText = `Player ${activeTurn}'s turn`;
        }
        function checkTTTWin() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return lines.some(combination => combination.every(i => tttState[i] === activeTurn));
        }
        // 5. SUDOKU RULE VERIFIER
        const initialSudokuPuzzle = [
            [5,3,0,0,7,0,0,0,0],[6,0,0,1,9,5,0,0,0],[0,9,8,0,0,0,0,6,0],
            [8,0,0,0,6,0,0,0,3],[4,0,0,8,0,3,0,0,1],[7,0,0,0,2,0,0,0,6],
            [0,6,0,0,0,0,2,8,0],[0,0,0,4,1,9,0,0,5],[0,0,0,0,8,0,0,7,9]
        ];
        function initSudoku() {
            const board = document.getElementById('sudoku-board');
            board.innerHTML = '';
            document.getElementById('sudoku-feedback').innerText = '';
            for(let r=0; r<9; r++) {
                for(let c=0; c<9; c++) {
                    const val = initialSudokuPuzzle[r][c];
                    const input = document.createElement('input');
                    input.type = 'number'; input.min = 1; input.max = 9;
                    input.className = 'sudoku-cell';
                    if (r === 2 || r === 5) input.classList.add('sudoku-block-row');
                    if(val !== 0) {
                        input.value = val; input.disabled = true;
                        input.style.backgroundColor = '#111827'; input.style.color = '#9ca3af';
                    } else {
                        input.oninput = function() {
                            if(this.value.length > 1) this.value = this.value.slice(0,1);
                            if(!/^[1-9]$/.test(this.value)) this.value = '';
                        };
                    }
                    board.appendChild(input);
                }
            }
        }
        function checkSudoku() {
            const cells = document.getElementById('sudoku-board').children;
            let currentGrid = [];
            for(let i=0; i<81; i++) {
                const val = parseInt(cells[i].value) || 0;
                if(val === 0) {
                    document.getElementById('sudoku-feedback').innerText = '⚠️ Complete all spaces before checking!';
                    document.getElementById('sudoku-feedback').className = "text-center text-sm font-semibold text-amber-400";
                    return;
                }
                currentGrid.push(val);
            }
            let isValid = true;
            for (let r = 0; r < 9; r++) {
                let set = new Set();
                for (let c = 0; c < 9; c++) set.add(currentGrid[r * 9 + c]);
                if (set.size !== 9) isValid = false;
            }
            for (let c = 0; c < 9; c++) {
                let set = new Set();
                for (let r = 0; r < 9; r++) set.add(currentGrid[r * 9 + c]);
                if (set.size !== 9) isValid = false;
            }
            const feedback = document.getElementById('sudoku-feedback');
            if(isValid) {
                feedback.innerText = '🎉 Perfect Solution! You Win!';
                feedback.className = "text-center text-sm font-bold text-emerald-400";
            } else {
                feedback.innerText = '❌ Rule violations found. Double-check duplicates!';
                feedback.className = "text-center text-sm font-bold text-rose-400";
            }
        }
    </script>
</body>
</html>
